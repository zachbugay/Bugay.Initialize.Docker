name: Build and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: version
        run: |
          MAJOR=1
          MINOR=0
          PATCH=$(git rev-list --count HEAD)
          echo "semver=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  build:
    needs: version
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Clean
        run: dotnet clean Bugay.Initialize.Docker.slnx

      - name: Publish
        run: >-
          dotnet publish Bugay.Initialize.Docker.slnx
          -c Release
          -r ${{ matrix.arch }}
          -p:Version=${{ needs.version.outputs.semver }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Bugay.Initialize.Docker-${{ needs.version.outputs.semver }}-${{ matrix.arch }}
          path: src/bin/Release/net10.0/${{ matrix.arch }}/publish/

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && zip -r "../../${dir%/}.zip" .)
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.version.outputs.semver }}
          name: v${{ needs.version.outputs.semver }}
          generate_release_notes: true
          files: '*.zip'
