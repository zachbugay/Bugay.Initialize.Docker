name: Build and Publish

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
      semver: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Semantic Release (dry run)
        id: semantic
        uses: cycjimmy/semantic-release-action@v6
        with:
          dry_run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    if: needs.version.outputs.new-release == 'true'
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [win-x64, win-arm64]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Clean
        run: dotnet clean Bugay.Initialize.Docker.slnx

      - name: Publish
        run: >-
          dotnet publish Bugay.Initialize.Docker.slnx
          -c Release
          -r ${{ matrix.arch }}
          -p:Version=${{ needs.version.outputs.semver }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Bugay.Initialize.Docker-${{ needs.version.outputs.semver }}-${{ matrix.arch }}
          path: src/bin/Release/net10.0/${{ matrix.arch }}/publish/

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Zip artifacts
        run: |
          cd artifacts
          for dir in */; do
            (cd "$dir" && zip -r "../../${dir%/}.zip" .)
          done
          mv *.zip "$GITHUB_WORKSPACE/"

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
